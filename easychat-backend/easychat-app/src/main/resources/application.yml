  global-config:
    db-config:
      id-type: auto

# LangChain4j LLM 配置
easychat:
  llm:
    api-key: ${OPENAI_API_KEY:XXXXXXXXXXXX}
    base-url: ${OPENAI_BASE_URL:https://api.deepseek.com/v1}
    model-name: ${OPENAI_MODEL:deepseek-chat}
    temperature: 0.7
    max-tokens: 2000
