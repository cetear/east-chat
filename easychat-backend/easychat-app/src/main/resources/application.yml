spring:
  application:
    name: easychat
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://gz-cdb-ns0ptu89.sql.tencentcdb.com:26090/ai-chat?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai
    username: aichat
